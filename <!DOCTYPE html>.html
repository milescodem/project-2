<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock & Stopwatch</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
        width: 350px;
    }

    h1 {
        margin-bottom: 20px;
    }

    #clock {
        font-size: 32px;
        font-weight: bold;
        color: #333;
        margin-bottom: 25px;
    }

    #display {
        font-size: 40px;
        margin-bottom: 20px;
        color: #222;
    }

    button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    .start {
        background: #28a745;
        color: white;
    }

    .pause {
        background: #ffc107;
        color: black;
    }

    .reset {
        background: #dc3545;
        color: white;
    }

    button:hover {
        opacity: 0.8;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🕒 Clock & Stopwatch</h1>

    <div id="clock">00:00:00</div>

    <div id="display">00:00:00</div>

    <button class="start" onclick="startStopwatch()">Start</button>
    <button class="pause" onclick="pauseStopwatch()">Pause</button>
    <button class="reset" onclick="resetStopwatch()">Reset</button>
</div>

<script>
// Live Clock
function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString();
    document.getElementById("clock").textContent = time;
}
setInterval(updateClock, 1000);
updateClock();

// Stopwatch
let seconds = 0;
let minutes = 0;
let hours = 0;
let timer = null;

function updateDisplay() {
    let h = String(hours).padStart(2, '0');
    let m = String(minutes).padStart(2, '0');
    let s = String(seconds).padStart(2, '0');

    document.getElementById("display").textContent = `${h}:${m}:${s}`;
}

function stopwatch() {
    seconds++;

    if (seconds == 60) {
        seconds = 0;
        minutes++;
    }

    if (minutes == 60) {
        minutes = 0;
        hours++;
    }

    updateDisplay();
}

function startStopwatch() {
    if (timer !== null) return;
    timer = setInterval(stopwatch, 1000);
}

function pauseStopwatch() {
    clearInterval(timer);
    timer = null;
}

function resetStopwatch() {
    clearInterval(timer);
    timer = null;
    seconds = 0;
    minutes = 0;
    hours = 0;
    updateDisplay();
}
</script>

</body>
</html>
